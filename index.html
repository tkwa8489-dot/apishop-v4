<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APISHOP V4 - OFFICIAL STORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        body { background-color: #000; color: #fff; font-family: 'Kanit', sans-serif; overflow-x: hidden; }
        .glass { background: #0a0a0a; border: 1px solid #1a1a1a; }
        .hidden { display: none; }
        input, textarea { background: #000 !important; border: 1px solid #222 !important; color: #fff !important; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- 1. หน้าแรก (SHOP UI) -->
    <div id="shop-page" class="max-w-6xl mx-auto">
        <nav class="flex justify-between items-center mb-10 border-b border-zinc-900 pb-6">
            <div>
                <h1 class="text-4xl font-black italic">APISHOP</h1>
                <p class="text-[10px] text-zinc-500 uppercase tracking-widest">Premium Account Store</p>
            </div>
            <div id="nav-auth">
                <button onclick="showPage('auth-page')" class="bg-white text-black px-6 py-2 rounded-xl font-bold text-xs hover:bg-red-600 hover:text-white transition">LOGIN / REGISTER</button>
            </div>
            <div id="nav-user" class="hidden flex items-center gap-4">
                <div class="text-right">
                    <p class="text-[10px] text-zinc-500 uppercase" id="display-name">USER</p>
                    <p class="text-green-500 font-bold"><span id="u-balance">0</span> ฿</p>
                </div>
                <button onclick="showPage('topup-page')" class="bg-orange-600 p-2 rounded-lg text-[10px] font-bold">TOPUP</button>
                <button onclick="logout()" class="bg-zinc-900 p-2 rounded-lg text-[10px] font-bold border border-zinc-800">EXIT</button>
                <button id="admin-btn" onclick="showPage('admin-page')" class="hidden bg-red-600 p-2 rounded-lg text-[10px] font-bold">ADMIN</button>
            </div>
        </nav>

        <div id="product-grid" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div>

        <div class="mt-20 border-t border-zinc-900 pt-10">
            <h3 class="text-xs font-bold text-zinc-500 mb-4 uppercase">Your History</h3>
            <div id="history-list" class="space-y-2"></div>
        </div>
    </div>

    <!-- 2. หน้า AUTH (LOGIN/REGISTER) -->
    <div id="auth-page" class="max-w-md mx-auto mt-10 glass p-10 rounded-[2.5rem] border-t-2 border-red-600 hidden">
        <h2 id="auth-title" class="text-3xl font-black text-center mb-8 italic">LOGIN</h2>
        <div class="space-y-4">
            <input type="text" id="auth-user" placeholder="USERNAME" class="w-full p-4 rounded-2xl outline-none text-center">
            <input type="password" id="auth-pass" placeholder="PASSWORD" class="w-full p-4 rounded-2xl outline-none text-center">
            <div id="pin-box" class="hidden">
                <input type="password" id="auth-pin" maxlength="4" placeholder="PIN (4 DIGITS)" class="w-full p-4 rounded-2xl outline-none text-center border-red-900/50">
            </div>
            <button onclick="processAuth()" id="auth-btn" class="w-full bg-white text-black p-4 rounded-2xl font-black text-xl hover:bg-red-600 hover:text-white transition">LOGIN</button>
            <p onclick="toggleAuth()" id="auth-switch" class="text-center text-[10px] text-zinc-600 cursor-pointer uppercase mt-4">Don't have account? Register</p>
            <button onclick="showPage('shop-page')" class="w-full text-zinc-700 text-[10px] mt-2">BACK TO SHOP</button>
        </div>
    </div>

    <!-- 3. หน้าเติมเงิน (TOPUP) -->
    <div id="topup-page" class="max-w-md mx-auto mt-10 glass p-10 rounded-[2.5rem] border-t-2 border-orange-500 hidden">
        <h2 class="text-3xl font-black text-center mb-2 italic uppercase text-orange-500">TOPUP</h2>
        <p class="text-center text-zinc-600 text-[10px] mb-8">TRUE WALLET GIFT LINK</p>
        <input type="text" id="gift-link" placeholder="https://gift.truemoney.com..." class="w-full p-4 rounded-2xl outline-none mb-4">
        <button onclick="processTopup()" class="w-full bg-orange-600 text-white p-4 rounded-2xl font-bold">REDEEM NOW</button>
        <button onclick="showPage('shop-page')" class="w-full text-zinc-700 text-[10px] mt-4 uppercase">Back</button>
    </div>

    <!-- 4. หน้าแอดมิน (ADMIN) -->
    <div id="admin-page" class="max-w-5xl mx-auto hidden pt-10">
        <h1 class="text-4xl font-black text-red-600 italic mb-10">BLACK OFFICE</h1>
        <div class="grid md:grid-cols-3 gap-8">
            <div class="glass p-8 rounded-[2rem] border border-zinc-900 h-fit">
                <h3 class="font-bold mb-6 text-red-500 uppercase italic">Add Account</h3>
                <div class="space-y-4">
                    <input type="text" id="adm-name" placeholder="Account Name" class="w-full p-4 rounded-xl outline-none">
                    <input type="number" id="adm-price" placeholder="Price" class="w-full p-4 rounded-xl outline-none">
                    <textarea id="adm-items" rows="5" placeholder="USER:PASS (1 line = 1 ID)" class="w-full p-4 rounded-xl text-[10px]"></textarea>
                    <button onclick="addStock()" class="w-full bg-red-600 p-4 rounded-xl font-bold">PUSH STOCK</button>
                </div>
            </div>
            <div id="adm-stock-list" class="md:col-span-2 space-y-2"></div>
        </div>
        <button onclick="showPage('shop-page')" class="mt-10 text-zinc-700 text-xs">BACK TO SHOP UI</button>
    </div>

    <script>
        // --- 1. CONFIG & DATA ---
        const ADMIN_ID = "apishop";
        const ADMIN_PASS = "123456789x";
        const ADMIN_PIN = "0000";

        let users = JSON.parse(localStorage.getItem('api_users')) || [];
        let stocks = JSON.parse(localStorage.getItem('api_stocks')) || [];
        let currentUser = null;
        let isLoginMode = true;

        // --- 2. AUTH LOGIC ---
        function toggleAuth() {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerText = isLoginMode ? "LOGIN" : "REGISTER";
            document.getElementById('auth-btn').innerText = isLoginMode ? "LOGIN" : "CREATE ACCOUNT";
            document.getElementById('auth-switch').innerText = isLoginMode ? "Don't have account? Register" : "Already have account? Login";
            document.getElementById('pin-box').classList.toggle('hidden', !isLoginMode);
        }

        function processAuth() {
            const user = document.getElementById('auth-user').value.toLowerCase().trim();
            const pass = document.getElementById('auth-pass').value;
            const pin = document.getElementById('auth-pin').value;

            if(!user || !pass) return alert("กรุณากรอกข้อมูล");

            if(isLoginMode) {
                // Admin Check
                if(user === ADMIN_ID && pass === ADMIN_PASS && pin === ADMIN_PIN) {
                    currentUser = { id: "ADMIN", balance: 999999, history: [] };
                    showPage('shop-page');
                    document.getElementById('admin-btn').classList.remove('hidden');
                    return;
                }
                // User Check
                const found = users.find(u => u.id === user && u.pass === pass);
                if(found) { currentUser = found; showPage('shop-page'); }
                else alert("ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง");
            } else {
                // Register Check
                if(user === ADMIN_ID) return alert("ชื่อนี้ถูกล็อคไว้ให้แอดมินเท่านั้น!");
                if(users.find(u => u.id === user)) return alert("ชื่อนี้มีคนใช้แล้ว!");
                
                users.push({ id: user, pass: pass, balance: 0, history: [] });
                saveData();
                alert("สมัครสำเร็จ! กรุณาเข้าสู่ระบบ");
                toggleAuth();
            }
            updateUI();
        }

        // --- 3. SHOP & TOPUP LOGIC ---
        function processTopup() {
            const link = document.getElementById('gift-link').value;
            if(!link.includes("gift.truemoney.com")) return alert("ลิงก์อั่งเปาไม่ถูกต้อง");
            
            // Mockup Auto Topup (สุ่มเงิน 10-100)
            const bonus = Math.floor(Math.random() * 90) + 10;
            currentUser.balance += bonus;
            currentUser.history.unshift({ type: "TOPUP", val: bonus, date: new Date().toLocaleString() });
            saveData();
            alert(`เติมเงินสำเร็จ! ได้รับ ${bonus} บาท`);
            showPage('shop-page');
            updateUI();
        }

        function buyItem(index) {
            if(!currentUser) return alert("กรุณาเข้าสู่ระบบก่อนซื้อ");
            const item = stocks[index];
            if(item.items.length === 0) return alert("สินค้าหมด!");
            if(currentUser.balance < item.price) return alert("เงินไม่พอ!");

            const account = item.items.shift();
            currentUser.balance -= item.price;
            currentUser.history.unshift({ type: "PURCHASE", name: item.name, data: account, date: new Date().toLocaleString() });
            
            saveData();
            updateUI();
            alert(`ซื้อสำเร็จ!\nบัญชีของคุณคือ: ${account}`);
        }

        // --- 4. ADMIN LOGIC ---
        function addStock() {
            const name = document.getElementById('adm-name').value;
            const price = parseInt(document.getElementById('adm-price').value);
            const data = document.getElementById('adm-items').value.split('\n').filter(x => x.trim() !== "");
            
            if(!name || !price || data.length === 0) return alert("ใส่ข้อมูลให้ครบ");
            stocks.push({ name, price, items: data });
            saveData();
            updateUI();
            alert("ลงของเรียบร้อย!");
        }

        // --- 5. UI HELPERS ---
        function showPage(pageId) {
            ['shop-page', 'auth-page', 'topup-page', 'admin-page'].forEach(p => document.getElementById(p).classList.add('hidden'));
            document.getElementById(pageId).classList.remove('hidden');
        }

        function updateUI() {
            // User Nav
            if(currentUser) {
                document.getElementById('nav-auth').classList.add('hidden');
                document.getElementById('nav-user').classList.remove('hidden');
                document.getElementById('display-name').innerText = currentUser.id;
                document.getElementById('u-balance').innerText = currentUser.balance;
            }

            // Shop Grid
            const grid = document.getElementById('product-grid');
            grid.innerHTML = stocks.map((s, i) => `
                <div class="glass p-6 rounded-[2rem] border border-zinc-900 text-center hover:border-red-600 transition">
                    <h3 class="font-bold italic text-lg uppercase">${s.name}</h3>
                    <p class="text-red-500 font-black text-2xl mb-4">${s.price} ฿</p>
                    <p class="text-[9px] text-zinc-600 uppercase mb-4">In Stock: ${s.items.length}</p>
                    <button onclick="buyItem(${i})" class="w-full bg-white text-black py-3 rounded-xl font-black text-[10px] hover:bg-red-600 hover:text-white transition">BUY NOW</button>
                </div>
            `).join('');

            // History List
            const hist = document.getElementById('history-list');
            hist.innerHTML = currentUser ? currentUser.history.map(h => `
                <div class="bg-zinc-950 p-4 rounded-xl border border-zinc-900 flex justify-between items-center text-[10px]">
                    <div>
                        <span class="${h.type === 'TOPUP' ? 'text-green-500' : 'text-sky-500'} font-bold">[${h.type}]</span> 
                        ${h.name || 'Topup Wallet'}
                    </div>
                    <div class="flex gap-4 items-center">
                        ${h.data ? `<code class="bg-black px-2 py-1 rounded border border-zinc-800">${h.data}</code> <button onclick="copyToClipboard('${h.data}')" class="text-zinc-500 font-bold underline">COPY</button>` : `<span class="text-green-500">+${h.val} ฿</span>`}
                        <span class="text-zinc-700">${h.date}</span>
                    </div>
                </div>
            `).join('') : '<p class="text-zinc-800 italic">Login to see history</p>';

            // Admin List
            const admList = document.getElementById('adm-stock-list');
            admList.innerHTML = stocks.map((s, i) => `
                <div class="bg-zinc-900 p-4 rounded-xl flex justify-between items-center">
                    <span class="text-xs">${s.name} (${s.items.length})</span>
                    <button onclick="stocks.splice(${i},1);saveData();updateUI();" class="text-red-500 text-xs font-bold">DELETE</button>
                </div>
            `).join('');
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text);
            alert("คัดลอกรหัสแล้ว!");
        }

        function logout() { location.reload(); }
        function saveData() {
            localStorage.setItem('api_users', JSON.stringify(users));
            localStorage.setItem('api_stocks', JSON.stringify(stocks));
        }

        updateUI();
    </script>
</body>
        </html>
