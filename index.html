<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APISHOP V4 - SEMI AUTO EDITION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        body { background-color: #000000; color: #ffffff; font-family: 'Kanit', sans-serif; margin: 0; overflow-x: hidden; }
        .glass { background: #0a0a0a; border: 1px solid #1a1a1a; }
        .hidden { display: none !important; }
        input, textarea, select { background: #000000 !important; border: 1px solid #222 !important; color: white !important; border-radius: 1rem !important; }
        .product-img { width: 100%; height: 140px; object-fit: cover; border-radius: 1.2rem; background: #111; }
        .avatar-circle { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid #3b82f6; background: #111; }
        .vip-glow { box-shadow: 0 0 15px #3b82f6; border-color: #60a5fa; animation: glow-pulse 2s infinite; }
        @keyframes glow-pulse { 0%, 100% { box-shadow: 0 0 5px #3b82f6; } 50% { box-shadow: 0 0 20px #60a5fa; } }
        #purchase-notif { position: fixed; bottom: 20px; left: 20px; background: rgba(10, 10, 10, 0.95); border: 1px solid #1a1a1a; border-left: 4px solid #3b82f6; padding: 10px 15px; border-radius: 1rem; display: flex; align-items: center; gap: 10px; z-index: 100; transform: translateX(-150%); transition: 0.5s; }
        #purchase-notif.show { transform: translateX(0); }
        .gacha-roll { animation: shake 0.5s infinite; }
        @keyframes shake { 0%, 100% { transform: translate(0,0); } 25% { transform: translate(2px,2px); } 50% { transform: translate(-2px, -2px); } }
    </style>
</head>
<body class="p-2 md:p-6">

    <!-- 1. หน้า LOGIN / REGISTER -->
    <div id="auth-page" class="max-w-md mx-auto mt-12 glass p-10 rounded-[2.5rem] border-t-2 border-sky-600 shadow-2xl text-center">
        <h1 class="text-5xl font-black text-white mb-2 italic tracking-tighter uppercase">APISHOP</h1>
        <div class="grid grid-cols-2 gap-2 my-6">
            <div class="bg-zinc-950/50 p-2 rounded-xl border border-zinc-900 font-bold text-[10px] uppercase">
                <p class="text-zinc-500">Users</p><p id="stat-users" class="text-lg text-sky-500">158</p>
            </div>
            <div class="bg-zinc-950/50 p-2 rounded-xl border border-zinc-900 font-bold text-[10px] uppercase">
                <p class="text-zinc-500">Sold</p><p id="stat-sold" class="text-lg text-green-500">432</p>
            </div>
        </div>
        <div class="space-y-4">
            <input type="text" id="user-id" placeholder="USERNAME" class="w-full p-4 outline-none text-center">
            <input type="password" id="user-pass" placeholder="PASSWORD" class="w-full p-4 outline-none text-center">
            <input type="text" id="user-pin" placeholder="PIN 4 หลัก" maxlength="4" class="w-full p-4 outline-none text-center">
            <button onclick="handleAuth()" class="w-full bg-white text-black p-4 rounded-2xl font-black text-xl hover:bg-sky-500 transition shadow-lg uppercase">Login / Register</button>
        </div>
    </div>

    <!-- 2. หน้า USER PANEL -->
    <div id="user-panel" class="max-w-6xl mx-auto hidden">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            <div class="glass p-6 rounded-[2rem] border-l-4 border-green-600 flex justify-between items-center shadow-lg">
                <div><p class="text-zinc-500 text-[10px] uppercase font-bold">ยอดเงินคงเหลือ</p><h2 class="text-4xl font-bold text-white"><span id="u-balance">0</span> ฿</h2></div>
                <button onclick="toggleSection('topup-box')" class="bg-green-600 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase shadow-md">เติมเงิน</button>
            </div>
            <div class="md:col-span-2 flex items-center justify-between glass p-6 rounded-[2rem] border-l-4 border-sky-600 px-8">
                <div class="flex items-center gap-4">
                    <img id="u-avatar" src="https://api.dicebear.com" class="avatar-circle">
                    <div><p class="text-[10px] text-zinc-500 font-bold uppercase mb-1 leading-none">ยินดีต้อนรับ</p><h3 class="text-2xl font-black text-white" id="u-name">USER</h3></div>
                </div>
                <div class="flex gap-2">
                    <button onclick="toggleSection('history-box')" class="bg-zinc-900 px-4 py-2 rounded-xl text-[10px] font-bold border border-zinc-800 text-white uppercase italic">History</button>
                    <button onclick="location.reload()" class="bg-red-950/20 text-red-500 px-4 py-2 rounded-xl text-[10px] font-bold border border-red-900/30 uppercase">Exit</button>
                </div>
            </div>
        </div>
        <div id="topup-box" class="hidden glass p-6 rounded-[2rem] mb-6 border border-orange-900/30">
            <p class="text-[10px] text-orange-500 mb-2 font-bold uppercase tracking-widest">🧧 เติมเงินอั่งเปา (เงินจะเข้าทันทีหลังจากส่งลิงก์)</p>
            <div class="flex gap-2">
                <input type="text" id="angpao-link" placeholder="วางลิงก์ซองของขวัญที่นี่..." class="flex-1 p-4 outline-none">
                <button onclick="processAngpao()" id="btn-redeem" class="bg-orange-600 px-6 py-4 rounded-2xl font-bold hover:bg-orange-500 transition shadow-lg">ยืนยันเติมเงิน</button>
            </div>
        </div>
        <div id="history-box" class="hidden glass p-6 rounded-[2rem] mb-6 border border-zinc-800"><h3 class="font-bold mb-4 text-sky-500 text-xs uppercase italic tracking-widest">📜 ประวัติการซื้อสินค้า</h3><div id="u-history-list" class="space-y-2 max-h-60 overflow-y-auto pr-2"></div></div>
        <div id="p-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4 pb-20">
             <!-- สินค้าจะมาโผล่ตรงนี้ -->
        </div>
    </div>

    <!-- 3. หน้า ADMIN PANEL -->
    <div id="admin-panel" class="max-w-6xl mx-auto hidden text-white">
        <div class="flex justify-between items-center mb-8 border-b border-zinc-900 pb-6"><h1 class="text-3xl font-black text-red-600 italic uppercase">BLACK OFFICE ADMIN</h1><button onclick="location.reload()" class="bg-white text-black px-6 py-2 rounded-full font-black text-xs uppercase">Logout</button></div>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8 text-center font-bold uppercase text-[10px]">
            <div class="bg-zinc-950 p-5 rounded-2xl border border-zinc-900"><p class="text-zinc-500 mb-1">ยอดขายรวม</p><h4 class="text-2xl text-green-500 font-black"><span id="adm-total-sales">0</span> ฿</h4></div>
            <div class="bg-zinc-950 p-5 rounded-2xl border border-zinc-900"><p class="text-zinc-500 mb-1">สมาชิกทั้งหมด</p><h4 class="text-2xl text-sky-500 font-black" id="adm-user-count">1</h4></div>
            <div class="bg-zinc-950 p-5 rounded-2xl border border-zinc-900"><p class="text-zinc-500 mb-1">สต็อกรวม</p><h4 class="text-2xl text-orange-500 font-black" id="adm-stock-count">0</h4></div>
        </div>

        <div class="grid md:grid-cols-3 gap-8">
            <div class="glass p-8 rounded-[2.5rem] border border-zinc-900 h-fit shadow-xl">
                <h3 class="font-bold mb-6 text-red-600 uppercase italic">จัดการสินค้า</h3>
                <div class="space-y-4">
                    <label class="cursor-pointer bg-zinc-950 block p-4 rounded-2xl border-2 border-dashed border-zinc-800 text-center hover:border-sky-500 transition"><span id="img-status" class="text-[10px] text-zinc-500 font-bold uppercase">📷 เลือกรูปสินค้า</span><input type="file" id="adm-img" accept="image/*" class="hidden" onchange="previewImg(this)"></label>
                    <select id="adm-type" class="w-full p-4 outline-none text-[10px]"><option value="normal">ขายปกติ</option><option value="gacha">สุ่มเปอร์เซ็นต์ (%)</option></select>
                    <input type="text" id="adm-name" placeholder="ชื่อสินค้า" class="w-full p-4 outline-none text-sm"><input type="number" id="adm-price" placeholder="ราคา" class="w-full p-4 outline-none text-sm">
                    <textarea id="adm-items" rows="4" placeholder="ไอดี (1 บรรทัด = 1 ตัว)" class="w-full p-4 outline-none text-sm"></textarea>
                    <button onclick="addProduct()" class="w-full bg-red-600 p-4 rounded-2xl font-black hover:bg-red-500 transition shadow-lg uppercase">ลงประกาศสินค้า</button>
                </div>
            </div>
            <div class="md:col-span-2 glass p-8 rounded-[2.5rem] border border-zinc-900">
                <h3 class="font-bold mb-6 text-zinc-500 uppercase italic">สินค้าในระบบ</h3>
                <div id="adm-product-list" class="grid gap-4"></div>
            </div>
        </div>
    </div>

    <!-- Notification -->
    <div id="purchase-notif">
        <div class="bg-sky-500 p-2 rounded-full">🛒</div>
        <div><p class="text-[10px] text-zinc-500 font-bold uppercase">สั่งซื้อสำเร็จ</p><p id="notif-text" class="text-xs font-bold text-white"></p></div>
    </div>

    <script>
        // ฟังก์ชันจัดการ Login (ตามที่น้องสั่ง)
        function handleAuth() {
            const user = document.getElementById('user-id').value;
            const pass = document.getElementById('user-pass').value;
            const pin = document.getElementById('user-pin').value;

            // เช็ค Admin apishop / 123456789x
            if (user === 'apishop' && pass === '123456789x') {
                document.getElementById('auth-page').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
                return;
            }

            // เช็ค User ทั่วไป
            if (user !== "" && pass !== "" && pin.length === 4) {
                document.getElementById('u-name').innerText = user;
                document.getElementById('auth-page').classList.add('hidden');
                document.getElementById('user-panel').classList.remove('hidden');
            } else {
                alert('กรุณากรอกข้อมูลให้ครบ (PIN 4 หลัก)');
            }
        }

        function toggleSection(id) {
            document.getElementById(id).classList.toggle('hidden');
        }

        function previewImg(input) {
            if (input.files && input.files[0]) {
                document.getElementById('img-status').innerText = "✅ " + input.files[0].name;
            }
        }

        // ระบบจำลองการเพิ่มสินค้า (ให้น้องเห็นภาพ)
        function addProduct() {
            const name = document.getElementById('adm-name').value;
            const price = document.getElementById('adm-price').value;
            if(!name || !price) return alert('กรอกข้อมูลให้ครบครับ');

            const grid = document.getElementById('p-grid');
            const card = `
                <div class="glass p-4 rounded-[2rem] border border-zinc-900 hover:border-sky-500 transition group">
                    <img src="https://via.placeholder.com" class="product-img mb-4">
                    <h4 class="font-bold text-sm mb-1">${name}</h4>
                    <p class="text-sky-500 font-black mb-4">${price} ฿</p>
                    <button class="w-full bg-zinc-900 py-2 rounded-xl text-[10px] font-bold uppercase group-hover:bg-sky-600 transition">Buy Now</button>
                </div>
            `;
            grid.innerHTML += card;
            alert('เพิ่มสินค้าสำเร็จ!');
        }

        function processAngpao() {
            const link = document.getElementById('angpao-link').value;
            if(link.includes('gift.truemoney.com')) {
                alert('ส่งข้อมูลไปตรวจสอบแล้ว (ระบบจำลอง)');
            } else {
                alert('ลิงก์ไม่ถูกต้อง');
            }
        }
    </script>
</body>
                  </html>
